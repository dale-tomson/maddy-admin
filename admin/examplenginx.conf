# --- Nginx Proxy Configuration (Generic) ---
# This config assumes SSL is handled at the Edge (e.g., Cloudflare/Load Balancer)
# The origin server receives plain HTTP on port 80. 
# THIS IS AN EXAMPLE CONFIGURATION. ADJUST AS NECESSARY FOR YOUR ENVIRONMENT FOR MADDY ADMIN.

server {
    listen 80;
    listen [::]:80;
    server_name admin.yourdomain.com; # <--- REPLACE WITH YOUR DOMAIN
    
    # Example IPv4 ranges
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    # (Add more ranges as needed)
    
    # Example IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    
    # Use the header provided by your proxy (CF-Connecting-IP for Cloudflare)
    real_ip_header CF-Connecting-IP;

    # --- 2. Proxy to Internal Service ---
    location / {
        # Replace with your internal service IP and Port
        proxy_pass         http://127.0.0.1:0000; 
        
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $http_x_forwarded_proto;

        # Standard timeout settings
        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 5s;

        proxy_buffering    on;
    }

    # --- 3. Hardening & Security Headers ---
    add_header X-Frame-Options          "SAMEORIGIN"           always;
    add_header X-Content-Type-Options   "nosniff"              always;
    add_header Referrer-Policy          "strict-origin"        always;
    add_header X-XSS-Protection         "1; mode=block"        always;
    
    # Content Security Policy (Adjust based on your app's requirements)
    add_header Content-Security-Policy
        "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;"
        always;

    # --- 4. Logging & Limits ---
    client_max_body_size 1m;
    access_log /var/log/nginx/admin-panel.access.log;
    error_log  /var/log/nginx/admin-panel.error.log warn;
}