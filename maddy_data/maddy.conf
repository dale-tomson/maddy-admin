# --- Macros (Variables) ---
$(hostname) = mx.febinanddale.com
$(primary_domain) = febinanddale.com

# --- Global Directives ---
hostname $(hostname)
autogenerated_msg_domain $(primary_domain)
tls file /data/tls/fullchain.pem /data/tls/privkey.pem

# --- 1. Storage & Auth ---
auth.pass_table local_authdb {
    table sql_table {
        driver sqlite3
        dsn /data/maddy.db
        table_name credentials
    }
}

storage.imapsql local_mailboxes {
    driver sqlite3
    dsn /data/maddy.db
}

# --- 2. Delivery Logic (Incoming) ---
msgpipeline local_routing {
    destination $(primary_domain) {
        deliver_to &local_mailboxes
    }
    default_destination {
        reject 550 5.1.1 "User not found"
    }
}

# --- 3. Delivery Logic (Outgoing with DKIM) ---
msgpipeline remote_signing {
    modify {
        dkim $(primary_domain) /data/dkim_keys/$(primary_domain)/default.key
    }
    deliver_to remote
}

# --- 4. SMTP Receiving (Port 25) ---
smtp tcp://0.0.0.0:25 {
    default_source {
        deliver_to &local_routing
    }
}

# --- 5. Submission (Sending from your accounts) ---
submission tls://0.0.0.0:465 tcp://0.0.0.0:587 {
    auth &local_authdb
    default_source {
        check {
            authorize_sender
        }
        # Send mail through the signing pipeline we created above
        deliver_to &remote_signing
    }
}

# --- 6. IMAP Access ---
imap tls://0.0.0.0:993 tcp://0.0.0.0:143 {
    auth &local_authdb
    storage &local_mailboxes
}

# --- 7. Monitoring (Prometheus/OpenMetrics) ---
# Exposes Maddy runtime/metrics for uptime, crashes, connections, etc.
# See maddy_data/maddy.conf.example for reference.
openmetrics tcp://127.0.0.1:9749 {
    # Bound to localhost to restrict access; adjust if you need remote scraping
}
